      patched. moving/movingup/movingdown are LEVEL gates, high while the
      slope is strictly outside [-threshold, +threshold]. Trigger outputs
      10 ms (>=1 tick). SPEC-GAPs / conventions (manual silent on exact
      comparators/filter): change uses strict >, edge/threshold use
      >=/strict-outside per the manual's wording; response maps directly to a
