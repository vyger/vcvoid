# Tier-4 proof patch: DB8E display controller — ONE display, no arbitration fight.
#
# Chain: declared [e4][m4][db8e] so the controller prefix matches the physical
# chain Master|E4|M4|DB8E. The DB8E is controller 3, so its encoder is E3.1 and
# its ring LED is L3.9.
#
# What to look for (issue 3c/3b/3d):
#  - OLED shows header "SWEEP" and a SMOOTHLY changing value (a 0.2 Hz triangle
#    swept 0.000..1.000) — intermediate fractions, not just 0/1. Only ONE display
#    circuit here, so there is no linger/ownership fight.
#  - Turning the encoder (E3.1) moves O2 and the value ring's dot; the cap's tick
#    mark spins as you turn (rotation feedback).
#  - Pressing the 8 face buttons lights each button's own LED (L3.1..L3.8), and
#    each is independent of the encoder ring (L3.9) — button 1 no longer blinks
#    the ring.

[e4]

[m4]

[db8e]

[lfo]
    hz = 0.2
    bipolar = 0
    level = 1
    triangle = _SWEEP

[display]
    header = "SWEEP"
    value = _SWEEP

[encoder]
    encoder = E3.1
    output = O2
    color = 0.6
