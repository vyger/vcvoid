# UAT core: registers, input math, normalization, R-as-input, clamping.
# Rack setup: [master | p2b8]. Scope O1..O5. Cables into I1/I2 come later
# in the script — start with both inputs UNPATCHED.
#
# What to look for:
#   O1: sine, 1..10 Hz following P1.1 (A*B+C input math)
#   O2: euclid trigger pattern (5/8) clocked from LED register R1 (§5.10)
#   O3: 0 V until a cable feeds I2; then I2*3, clamped at +/-10 V
#   O4: envelope retriggering at 2 Hz from N1 normalization while I1 is
#       unpatched; patching a different clock into I1 must take over live
#   O5: 5 Hz square gated by button B1.1 toggle (LED L1.1 mirrors state)
#   R1 (input-1 LED on the 4x4 matrix): flashes at 3 Hz, overriding the
#       default jack-voltage mirroring
[p2b8]

# 1) Pot input math: hz = P1.1 * 9 + 1
[lfo]
    hz = P1.1 * 9 + 1
    sine = O1

# 2) Normalization: internal 2 Hz clock feeds N1; unpatched I1 reads it.
[lfo]
    hz = 2
    square = N1

[contour]
    trigger = I1
    attack = 0.01
    decay = 0.1
    sustain = 0.3
    release = 0.1
    output = O4

# 3) R register misused as an internal signal (manual §5.10).
[lfo]
    hz = 3
    square = R1

[euklid]
    clock = R1
    length = 8
    beats = 5
    output = O2

# 4) Jack clamping: I2 * 3 pins at +/-10 V on the jack.
[copy]
    input = I2 * 3
    output = O3

# 5) Button toggle gates an LFO via its own LED register.
[button]
    button = B1.1
    led = L1.1

[lfo]
    hz = 5
    level = L1.1
    square = O5
