# UAT overlays + presets: buttongroup-selected pot functions, algoquencer
# OUTPUTS:
#  O1: gated ADSR at 1 Hz whose shape only changes on the SELECTED stage
#  O2: algoquencer triggers for active steps
#  O3: algoquencer pitch CV

[p2b8]
[b32]

[lfo]
    hz = 0.5
    square = _CLOCK

# --- one pot, four functions -------------------------------------------
[buttongroup]
    button1 = B1.1
    button2 = B1.2
    button3 = B1.3
    button4 = B1.4
    led1 = L1.1
    led2 = L1.2
    led3 = L1.3
    led4 = L1.4
    output = _SEL

[pot]
    pot = P1.1
    select = _SEL
    selectat = 0
    output = _ATTACK

[pot]
    pot = P1.1
    select = _SEL
    selectat = 1
    output = _DECAY

[pot]
    pot = P1.1
    select = _SEL
    selectat = 2
    output = _SUSTAIN

[pot]
    pot = P1.1
    select = _SEL
    selectat = 3
    output = _RELEASE

[contour]
    gate = _CLOCK
    attack = _ATTACK
    decay = _DECAY
    sustain = _SUSTAIN
    release = _RELEASE
    output = O1

# --- algoquencer with presets ------------------------------------------
[pot]
    pot = P1.2
    discrete = 8
    output = _PRESET

[button]
    button = B1.5
    longpress = _LOADP

[button]
    button = B1.6
    longpress = _SAVEP

[algoquencer]
    clock = _CLOCK
    length = 8
    button1 = B2.1
    button2 = B2.2
    button3 = B2.3
    button4 = B2.4
    button5 = B2.5
    button6 = B2.6
    button7 = B2.7
    button8 = B2.8
    led1 = L2.1
    led2 = L2.2
    led3 = L2.3
    led4 = L2.4
    led5 = L2.5
    led6 = L2.6
    led7 = L2.7
    led8 = L2.8
    preset = _PRESET
    loadpreset = _LOADP
    savepreset = _SAVEP
    trigger = O2
    pitch = O3
