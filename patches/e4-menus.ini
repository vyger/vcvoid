# e4-menus.ini — test fixture for a user bug report about E4 menu function.
#
# The reported patch overlays multiple encoderbank menus on the same E4
# encoders, gated with `select` from a buttongroup. Symptoms in vcvoid: only
# one menu showed moving-dot ring feedback while turning, menu switches did
# not snap the rings to the newly selected bank's values, and ring colors
# never showed. This distills that structure to minimum size: four
# encoderbanks overlaid on the SAME four encoders (E2.1..E2.4), selected by a
# buttongroup on B1.1..B1.4, each menu copying one configuration style the
# reported patch used:
#
#   menu 1 (B1.1)  the style that DID show moving-dot feedback: explicit
#                  mode = 1, all led params wired to 0, color cyan.
#   menu 2 (B1.2)  discrete = 32 rotary-switch mode with
#                  outputscale/outputoffset.
#   menu 3 (B1.3)  bipolar mode = 2 with notch and negativecolor.
#   menu 4 (B1.4)  mode unset (defaults to 1), led params driven by DYNAMIC
#                  values (LFO blink), like the original's cable-driven leds.
#
# What to check in vcvoid against real-hardware behavior:
#   * moving-dot feedback while turning, in EVERY menu (not just menu 1)
#   * on switching menus, the rings must JUMP to the newly selected bank's
#     values at once (startvalues differ per bank to make that visible)
#   * ring color must differ per menu (cyan / red / violet+blue / green)
#   * menu 4's rings must blink (dynamic led params override the value dot)
#
# Outputs for scoping: menu 1 -> O1..O4, menu 2 -> O5..O8 (encoderbank outputs
# stay live even while unselected — only buttons/leds are gated by select).
# Menus 3/4 land on N1..N4 / N5..N8 the same way.

[p2b8]
[e4]

# --- menu selection, one button per menu (the original: same buttongroup on B1.1..B1.8)
[buttongroup]
    button1 = B1.1
    led1 = L1.1
    buttonoutput1 = _MENU1
    button2 = B1.2
    led2 = L1.2
    buttonoutput2 = _MENU2
    button3 = B1.3
    led3 = L1.3
    buttonoutput3 = _MENU3
    button4 = B1.4
    led4 = L1.4
    buttonoutput4 = _MENU4
    startbutton = 1

# --- menu 1: (mode = 1, leds forced to 0, cyan) — may be working currently
[encoderbank]
    select = _MENU1
    firstencoder = E2.1
    mode = 1
    autozoom = 1
    sensivity = 2
    color = 0.2
    startvalue = 0.25
    output1 = O1
    output2 = O2
    output3 = O3
    output4 = O4
    led1 = 0
    led2 = 0
    led3 = 0
    led4 = 0

# --- menu 2: (discrete rotary switch + output scaling)
[encoderbank]
    select = _MENU2
    firstencoder = E2.1
    startvalue = 0
    discrete = 32
    outputscale = 1
    outputoffset = 1
    autozoom = 1
    sensivity = 2
    color = 0.9
    output1 = O5
    output2 = O6
    output3 = O7
    output4 = O8

# --- menu 3: (bipolar with notch and negativecolor)
[encoderbank]
    select = _MENU3
    firstencoder = E2.1
    mode = 2
    notch = 0.15
    color = 1.1
    negativecolor = 1.2
    autozoom = 1
    sensivity = 2
    startvalue = 0.75
    output1 = _M3_V1
    output2 = _M3_V2
    output3 = _M3_V3
    output4 = _M3_V4

# --- menu 4: (mode left at default, leds driven dynamically)
[encoderbank]
    select = _MENU4
    firstencoder = E2.1
    autozoom = 1
    sensivity = 2
    color = 0.55
    startvalue = 1.0
    output1 = _M4_V1
    output2 = _M4_V2
    output3 = _M4_V3
    output4 = _M4_V4
    led1 = _BLINK * 0.25
    led2 = _BLINK * 0.5
    led3 = 0
    led4 = _BLINK

# 2 Hz blink source for menu 4's dynamic leds
[lfo]
    hz = 2
    square = _BLINK

# park menus 3/4 outputs on input normalizations so every cable has a reader
[copy]
    input = _M3_V1
    output = N1
[copy]
    input = _M3_V2
    output = N2
[copy]
    input = _M3_V3
    output = N3
[copy]
    input = _M3_V4
    output = N4
[copy]
    input = _M4_V1
    output = N5
[copy]
    input = _M4_V2
    output = N6
[copy]
    input = _M4_V3
    output = N7
[copy]
    input = _M4_V4
    output = N8
