# -----------------------------------------------------------------------------
# mine-01-clock-divider
#
# A self-running clock source and a divided version of it.
# Circuits used: lfo, clocktool
#
# The LFO produces a square-wave master clock. The clocktool reads that
# same clock (straight off output O1) and divides it by 4.
#
# OUTPUTS
#   O1: master clock  (8 Hz square = 120 BPM at 16th notes)
#   O2: clock / 4     (one pulse for every four master pulses)
# -----------------------------------------------------------------------------

[lfo]
    hz     = 8        # 8 Hz -> 120 BPM in 16th notes (BPM = hz * 15)
    square = O1

[clocktool]
    clock  = O1       # read the master clock back from output O1
    divide = 4
    output = O2
