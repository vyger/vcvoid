# UAT gates: G8 jacks in both directions, R-register override of a G8 LED,
# X7 gate outputs. Rack setup: [master | g8 | x7] (x7 optional until the
# X7 steps).
#
# What to look for:
#   G1 (G8 jack 1, lower half = output): 1 Hz gate, 0/5 V only
#   G2 (G8 jack 2, output): 0.5 Hz gate (divide-by-2)
#   G5/G6 (G8 jacks 5+6, upper half = input): feed gates in;
#     O1 mirrors G5 (0 V / 10 V), O2 = G6 * 0.5 + 0.25 offset math on a gate
#   First LED on the G8 (R17): 3 Hz flash override
#   G9 (X7 gate 1): 2 Hz gate when an X7 is chained
[lfo]
    hz = 1
    square = _CLK

[copy]
    input = _CLK
    output = G1

[clocktool]
    clock = _CLK
    divide = 2
    output = G2

[copy]
    input = G5
    output = O1

[copy]
    input = G6 * 0.5 + 0.25
    output = O2

[lfo]
    hz = 3
    square = R17

[lfo]
    hz = 2
    square = G9
