# Tier-4 proof patch: M4 motor faders — DISCRETE recall, not continuous LFO.
#
# Chain: declared [e4][m4] so the patch's controller prefix matches the physical
# chain Master|E4|M4|DB8E (the E4 is just a position placeholder here; the DB8E
# is surplus/idle). The M4 is therefore controller 2 and its first fader is the
# first fader overall (the E4 has none), so `fader = 1` selects M4 fader 1.
#
# What to look for (issue 2b/2c): fader 1 SNAPS to one of two commanded
# positions (bottom or top) and HOLDS there — it must NOT glide continuously.
# `_POS` is a square wave, so it is only ever 0 or 1 (a discrete commanded
# position); `_RECALL` re-latches that position a few times a second (a `clear`
# trigger reloads `startvalue`). Grab the fader to override it (touch wins);
# release and the next recall retakes the commanded position. O1 tracks the
# fader and should read 0 V or +10 V while held, not a swept voltage.

[e4]

[m4]

[lfo]
    hz = 0.25
    bipolar = 0
    square = _POS

[lfo]
    hz = 1
    square = _RECALL

[motorfader]
    fader = 1
    startvalue = _POS
    clear = _RECALL
    ledvalue = 1
    ledcolor = 0.2
    output = O1
