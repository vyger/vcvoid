# Tier-4 proof patch: M5 midiout — self-contained CV-to-MIDI sender via the X7.

# 
# Chain: Master | DroidX7  (any controller optional). `usb = 1` sends the MIDI
# stream to the X7 USB port. Point the X7 USB-out at a MIDI monitor or DAW
# (e.g. an IAC bus) — no external input is needed, the patch plays itself.
# 
# How it works: a 2 Hz lfo square is the step clock (_CLK). A 4-step
# sequencer walks an ascending pitch (_PITCH) and emits a per-step gate
# (_GATE). The midiout circuit turns each gate edge into a MIDI note-on/off at
# the current pitch (1 V/oct, MIDI note 24 = 0 V; default channel 1, vel 127).
# 
# What to look for: a steady stream of note-on/off events climbing four notes
# then repeating (0.25 -> note 54, 0.30 -> 60, 0.35 -> 66, 0.40 -> 72). The X7
# USB LED flashes green on note-on, red on note-off.

[m4]
[e4]

[lfo]
    hz = 2
    bipolar = 0
    square = _CLK

[sequencer]
    clock = _CLK
    pitch1 = 0.1
    pitch2 = 0.2
    pitch3 = 0.3
    pitch4 = 0.4
    pitch5 = 0.2
    pitch6 = 0.3
    pitch7 = 0.4
    pitchoutput = _PITCH
    gateoutput = _GATE

[midiout]
    usb = 1
    pitch1 = _PITCH
    gate1 = _GATE

[copy]
    input = _PITCH
    output = O1

[copy]
    input = _GATE
    output = G9

[copy]
    input = _CLK
    output = G10

[motorfader]
    fader = 1
    notches = 8
    output = _MODEL

[motorfader]
    fader = 2
    output = _TIMBRE

[motorfader]
    fader = 3
    output = _MORPH

[motorfader]
    fader = 4
    output = _HARM

[copy]
    input = _MODEL * 0.0625
    output = O5

[copy]
    input = _TIMBRE * 0.6
    output = O6

[copy]
    input = _MORPH
    output = O7

[copy]
    input = _HARM
    output = O8
