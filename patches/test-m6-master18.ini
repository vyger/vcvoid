# LABELS: master=18
# M6 UAT patch for the master18 module. Load on a vcvoid master18.
#
# VCO tuner: patch a VCV VCO (sine, C4 = 0 V on its V/OCT) into I1.
#   O1 = measured frequency / 1000 (C4 = 261.63 Hz -> 2.616 V on a scope x0.01;
#        via the cable scaling below O1 reads 0.26163 * 10 V = 2.62 V)
#   O2 = pitch (1 V/oct; 0 V = DROID C0 = 130.81 Hz — DROID octave numbers
#        sit 3 above MIDI/VCV, A1 = 440 Hz. A VCV C4 VCO -> 1.000 V)
#   O3 = intune gate (high when the VCO sits on a semitone)
#   Unplug I1: O1 falls to 0 within a second, O3 goes low, O2 holds.
#
# Native MIDI loopback — no keyboard/DAW needed. The patch GENERATES notes
# (1/s, semitone-quantized wandering pitch) and sends them out USB MIDI;
# route them back in via the OS loopback: set BOTH pickers in the module's
# right-click menu to IAC "Bus 1" (macOS):
#   "USB MIDI output"  -> IAC Bus 1
#   "MIDI1 input (TRS)" -> IAC Bus 1
# Then: O4 = received gate (1/s), O5 = received pitch (stepped semitones),
# G1 blinks 5 V on each note. Silence on O4/O5 = loopback not routed.

[vcotuner]
    hz = _HZ
    pitch = O2
    intune = O3

[math]
    input1 = _HZ
    input2 = 1000
    quotient = O1

# --- note generator: 1 gate/s, slow semitone-quantized pitch wander ------
[lfo]
    hz = 1
    square = _MGATE

[lfo]
    hz = 0.02
    level = 0.2
    triangle = _MPITCH

[quantizer]
    input = _MPITCH
    output = _MQUANT

[midiout]
    usb = 1
    gate = _MGATE
    pitch = _MQUANT

# --- receive side: notes come back in via the OS MIDI loopback -----------
[midiin]
    trs = 1
    gate = O4
    pitch = O5

[copy]
    input = O4
    output = G1

# Gate-input threshold check: I2 read as a gate register (0.75 V hardware
# threshold). DC below 0.75 V -> O6 = 0 V; above -> O6 = 10 V. Note the
# vcotuner probe on I1 does NOT use this threshold — it needs bipolar
# zero crossings (must dip below 0 V).
[copy]
    input = I2
    output = O6
