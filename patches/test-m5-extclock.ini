# M5 UAT 9.4: external MIDI clock (Ableton, 24 PPQN) -> midiin clock outputs.
# Chain: [master | x7]. X7 USB input picker -> IAC Bus 1; Ableton set to send
# MIDI clock to IAC Bus 1, transport running.
#
# What to look for (scope O1/O2):
#   O1 = 16th-note clock reconstructed from the 24 PPQN stream. At 120 BPM
#        that is 8 Hz, dead steady — no drop-related jitter (the M5 open
#        question). Nudge Ableton's tempo: O1 follows smoothly.
#   O2 = transport gate: high while Ableton plays, low on stop.
#   G9 = mirrors the 16th clock on the X7 gate 1 LED.

[midiin]
    usb = 1
    clock = O1
    running = O2

[copy]
    input = O1
    output = G9
