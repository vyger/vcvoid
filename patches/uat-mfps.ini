# Canonical Motor Fader Performance Sequencer (MFPS), FULL feature set.
# Generated by the Forge's own patch generator, then compressed with
# blue-6 abbreviated parameter names exactly as the Forge does for
# hardware upload — this file runs unmodified on a real DROID.
# Regenerate:
#   tools/droidcheck/vendor/droidforge/droidforge/pg/sequencer \
#     m=master tracks=4 t1out=cvgate t2out=cvgate t3out=cvgate \
#     t4out=cvgate midiinclk=off midiinscale=off dualout=0 velo=off \
#     | tools/inicompress.py /dev/stdin > patches/uat-mfps.ini
# Melody sequencer with 4 tracks

# B1.1: [ROOT] Allow root note
# B1.2: [3RD] Allow third note
# B1.3: [5TH] Allow fifth note
# B1.4: [7TH] Allow seventh note
# B1.5: [9TH] Allow nineth note
# B1.6: [11TH] Allow eleventh note
# B1.7: [13TH] Allow thirtheenth note
# B1.8: [CTRL] Switch some of the button functions
# B2.1: [Preset A] Ctrl: Switch to preset A, long press: save to preset A
# B2.10: [LUCK] Randomly change step buttons, if Ctrl is held, change the gates instead.
# B2.11: [RST] Reset current track (Ctrl: all track) to step 1 immediately
# B2.12: [START] Start/stop sequencer - start also does reset
# B2.13: [TON] Tonality menu
# B2.14: [CLK] Menu for clock speed and swing
# B2.15: [TRK] Track menu
# B2.16: [PERF] Performance menu
# B2.17: [RATC] Number of sub gates per clock
# B2.18: [REP] Number of repeats, skip steps
# B2.19: [PAT] Pattern for repeated gates
# B2.2: [Preset B] Ctrl: Switch to preset B, long press: save to preset B
# B2.20: [S/E] Set start and end (range of steps to play)
# B2.21: [RAND] Pitch randomization
# B2.22: [ACT] Set step activities
# B2.23: [PROB] Gate probability
# B2.24: [COPY] Copy current page of current track. With CTRL: Paste
# B2.25: [NOTE] Set motor faders to pitch
# B2.27: [GL] Gate length and glide
# B2.28: [PAGE] Select second page of steps
# B2.29: [Track 1] Select track 1
# B2.3: [Preset C] Ctrl: Switch to preset C, long press: save to preset C
# B2.30: [Track 2] Select track 2
# B2.31: [Track 3] Select track 3
# B2.32: [Track 4] Select track 4
# B2.4: [CLR] Short press: reset play mode, with CTRL: clear track, long press factory reset
# B2.5: [TBR] If enabled, transposes the melody when the root note changes.
# B2.6: [INV] Invert the melody (change low to high and vice versa)
# B2.7: [AAAB] Switch between the song from A, AAAB and AABB
# B2.8: [CHRO] Disable scale and note selection, allow all 12 notes
# B2.9: [ARP] Switch this track to arpeggio mode
# I1: [CLK In] External clock
# I2: [RST In] Reset all sequences to step 1 on a gate or trigger here
# I3: [Root] Root note, in 1/12V steps.
# I4: [Scale] Scale, in 1/12V steps.
# I5: [Transp] Global transposition of all tracks
# O1: [Gate 1] Gate output track 1
# O2: [Gate 2] Gate output track 2
# O3: [Gate 3] Gate output track 3
# O4: [Gate 4] Gate output track 4
# O5: [V/O 1] Pitch CV output track 1
# O6: [V/O 2] Pitch CV output track 2
# O7: [V/O 3] Pitch CV output track 3
# O8: [V/O 4] Pitch CV output track 4
# P1.1: [RANGE/REPEAT] Arpeggio pitch range / Repeat note shift
# P1.2: [BASE/RATCH] Arpeggio base pitch / Ratchet note shift

[p2b8]
[b32]
[m4]
[m4]

# --------------------------------------------------
# Tonality
# --------------------------------------------------


# Mix together all sources for the root note
[mixer]
    i1 = _ROOT_FADER
    i2 = I3 * 120
    o = _ROOT

# Mix together sources for the scale
[mixer]
    i1 = _DEGREE_FADER
    i2 = I4 * 120
    o = _DEGREE

# Set the root note (from C, C#, D, ... to C again)
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 97
    f = 1
    n = 13
    lc = 1.1
    lv = 1
    o = _ROOT_FADER

# Set the musical scale
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 97
    f = 2
    n = 12
    sv = 7
    lc = _COLOR_DEGREE_FADER
    lv = 1
    o = _DEGREE_FADER

# Select the color for the scale fader
[multicompare]
    i = _DEGREE_FADER
    c1 = 0
    if1 = 0.5
    c2 = 1
    if2 = 0.4
    c3 = 2
    if3 = 0.73
    c4 = 6
    if4 = 0.2
    c5 = 7
    if5 = 1.2
    c6 = 9
    if6 = 1.1
    e = 0.0
    o = _COLOR_DEGREE_FADER

# Global octave switch for all tracks
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 97
    f = 3
    n = 5
    sv = 2
    lc = 0.2
    lv = -0.3
    o = _GLOBAL_OCTAVE_SWITCH
    b = _RESET_OCTAVE_SWITCH
    cl = _RESET_OCTAVE_SWITCH

# Global diatonic transposition for all tracks
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 97
    f = 4
    n = 15
    oo = -7
    sv = 7
    lc = 0.4
    lv = -0.3
    o = _GLOBAL_NOTESHIFT
    b = _RESET_NOTESHIFT
    cl = _RESET_NOTESHIFT
    hr = "DIATONIC TRANSPOSE"

# Prevent the pitch to change between clock ticks
[sample]
    i = _GLOBAL_NOTESHIFT
    sm = _CLOCK
    o = _GLOBAL_NOTESHIFT_CLOCKED

# Global transposition by semitones for all tracks
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 97
    f = 5
    n = 25
    sv = 12
    oo = -12
    lc = 0.85
    lv = -0.3
    o = _GLOBAL_TRANSPOSITION
    b = _RESET_TRANSPOSITION
    cl = _RESET_TRANSPOSITION
    hr = "TRANSPOSITION"

# Global transposition by semitones for all tracks
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 97
    f = 6
    n = 3
    sv = 0
    lc = 0
    lv = _TUNING_LED + 0.3
    o = _TUNING_COMPOSE
    dy = 0

# Make tuning mode or compose mode active depending on the fader position.
[switch]
    i1 = 1
    of = _TUNING_COMPOSE
    o2 = _COMPOSEMODE
    o3 = _TUNINGMODE

# Let the LED blink so that we are aware of the special mode
[lfo]
    hz = 5
    l = 0.7 * _TUNING_COMPOSE
    q = _TUNING_LED

# Glide length (duration of slides)
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 97
    f = 7
    sv = 0.3
    lc = 0.5
    lv = 1
    o = _T1_GLIDE_LENGTH_FADER
    hr = "GLIDE DURATION"

# Make glide reasonably fast, make fader curve zoomed in in the short glide times.
[math]
    i1 = _T1_GLIDE_LENGTH_FADER * 0.5
    i2 = 3.0
    pw = _T1_GLIDE_LENGTH

# Set the CV range for track 1
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 97
    f = 8
    n = 6
    sv = 1
    lc = 0.65
    lv = _TUNING_LED + 0.3
    oo = 1
    o = _T1_CVRANGE
    hr = "Range (octaves)"

# Glide length (duration of slides)
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 194
    f = 7
    sv = 0.3
    lc = 0.5
    lv = 1
    o = _T2_GLIDE_LENGTH_FADER
    hr = "GLIDE DURATION"

# Make glide reasonably fast, make fader curve zoomed in in the short glide times.
[math]
    i1 = _T2_GLIDE_LENGTH_FADER * 0.5
    i2 = 3.0
    pw = _T2_GLIDE_LENGTH

# Set the CV range for track 2
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 194
    f = 8
    n = 6
    sv = 1
    lc = 0.65
    lv = _TUNING_LED + 0.3
    oo = 1
    o = _T2_CVRANGE
    hr = "Range (octaves)"

# Glide length (duration of slides)
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 291
    f = 7
    sv = 0.3
    lc = 0.5
    lv = 1
    o = _T3_GLIDE_LENGTH_FADER
    hr = "GLIDE DURATION"

# Make glide reasonably fast, make fader curve zoomed in in the short glide times.
[math]
    i1 = _T3_GLIDE_LENGTH_FADER * 0.5
    i2 = 3.0
    pw = _T3_GLIDE_LENGTH

# Set the CV range for track 3
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 291
    f = 8
    n = 6
    sv = 1
    lc = 0.65
    lv = _TUNING_LED + 0.3
    oo = 1
    o = _T3_CVRANGE
    hr = "Range (octaves)"

# Glide length (duration of slides)
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 388
    f = 7
    sv = 0.3
    lc = 0.5
    lv = 1
    o = _T4_GLIDE_LENGTH_FADER
    hr = "GLIDE DURATION"

# Make glide reasonably fast, make fader curve zoomed in in the short glide times.
[math]
    i1 = _T4_GLIDE_LENGTH_FADER * 0.5
    i2 = 3.0
    pw = _T4_GLIDE_LENGTH

# Set the CV range for track 4
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 388
    f = 8
    n = 6
    sv = 1
    lc = 0.65
    lv = _TUNING_LED + 0.3
    oo = 1
    o = _T4_CVRANGE
    hr = "Range (octaves)"

# --------------------------------------------------
# Clocking
# --------------------------------------------------


# Selects 100s of BPM
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 99
    f = 1
    n = 3
    o = _CLOCK_BPM_100
    sv = 1
    lc = 0.2
    lv = 1
    dy = 0

# Selects 10s of BPM
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 99
    f = 2
    n = 10
    o = _CLOCK_BPM_10
    sv = 2
    lc = 0.2
    lv = 1
    dy = 0

# Selects 1s of BPM
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 99
    f = 3
    n = 10
    o = _CLOCK_BPM_1
    sv = 0
    lc = 0.2
    lv = 1
    dy = 0

# Clock bend half speed / double speed. Touch button to reset.
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 99
    f = 4
    o = _CLOCK_BEND_FADER
    sv = 0.5
    lc = _CLOCK_BEND_COLOR
    lv = 1
    b = _RESET_CLOCK_BEND
    cl = _RESET_CLOCK_BEND
    dy = 0

# Snap to the perfectly neutral position if the fader is almost there.
[pot]
    p = _CLOCK_BEND_FADER
    no = 0.01
    o = _CLOCK_BEND
    dy = 0

# Let the LED light bright if the bending alteration is exactly zero.
[ifequal]
    i1 = _CLOCK_BEND
    i2 = 0.5
    q = 0.4
    e = 0.8
    o = _CLOCK_BEND_COLOR

# Add up all three BPM faders
[mixer]
    i1 = _CLOCK_BPM_100 * 100
    i2 = _CLOCK_BPM_10 * 10
    i3 = _CLOCK_BPM_1
    o = _CLOCK_BPM_THREE_FADERS

# Clock swing (shuffle)
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 99
    f = 5
    o = _CLOCK_SWING
    lc = 1.1
    lv = _CLOCK_SWING * 0.9 + 0.1
    hr = "SWING"

# Small hack for letting the user toggle the state with the touch button
[switch]
    i1 = _INT_CLOCK_UNMUTED
    i2 = 0
    of = B2.4
    o = _CLOCK_MUTE_STARTVALUE

# Mute the clock, switch to external clocks if present. Touch button to toggle.
[motorfader]
    s = _GLOBAL_FADER_SELECTION
    sa = 99
    f = 6
    n = 2
    o = _INT_CLOCK_UNMUTED
    b = _TOGGLE_CLOCK_MUTE
    cl = _TOGGLE_CLOCK_MUTE
    sv = 1 - _CLOCK_MUTE_STARTVALUE
    lc = _INT_CLOCK_UNMUTED * -0.400000 + 0.800000
    lv = 1

# Disable this unused fader
[unusedfaders]
    s = _GLOBAL_FADER_SELECTION
    sa = 99
    f = 7

# Range of pitch accumulator
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 99
    f = 8
    sv = 3
    n = 17
    lc = 1.2
    lv = 1
    o = _T1_ACCU_RANGE
    hr = "ACCU CYCLES"

# Range of pitch accumulator
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 198
    f = 8
    sv = 3
    n = 17
    lc = 1.2
    lv = 1
    o = _T2_ACCU_RANGE
    hr = "ACCU CYCLES"

# Range of pitch accumulator
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 297
    f = 8
    sv = 3
    n = 17
    lc = 1.2
    lv = 1
    o = _T3_ACCU_RANGE
    hr = "ACCU CYCLES"

# Range of pitch accumulator
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _SELECTED_TRACK
    sa = 396
    f = 8
    sv = 3
    n = 17
    lc = 1.2
    lv = 1
    o = _T4_ACCU_RANGE
    hr = "ACCU CYCLES"

# Split clock bending fader in two hemispheres, so the the lower one is linear and can go to
# 0 Hz, while the upper half is going to exactly double speed.
[pot]
    p = _CLOCK_BEND
    li = _CLOCK_BEND_LINEAR
    r = _CLOCK_BEND_EXP

[math]
    i1 = 2
    i2 = _CLOCK_BEND_EXP
    pw = _CLOCK_BEND_FACTOR

[copy]
    i = _CLOCK_BPM_THREE_FADERS * _CLOCK_BEND_LINEAR
    o = _CLOCK_BPM_LINEAR

[copy]
    i = _CLOCK_BPM_LINEAR * _CLOCK_BEND_FACTOR
    o = _CLOCK_BPM_UNMUTED

# Set the BPM to zero while the clock is muted.
[copy]
    i = _CLOCK_BPM_UNMUTED * _INT_CLOCK_UNMUTED
    o = _CLOCK_BPM

# The actual clock, use a very short pulse so we have essentially just triggers
[lfo]
    hz = _CLOCK_BPM / 15
    pw = 0.1
    q = _INT_CLOCK
    sy = _RUNNING

# Detect an external clock signal, if within the last 2 seconds there was a trigger
[gatetool]
    it = I1
    gl = 2
    og = _EXTERNAL_CLOCK_PRESENT

# Select first avaiable clock in defined precedence order
[case]
    c1 = _INT_CLOCK_UNMUTED
    v1 = _INT_CLOCK
    c2 = _EXTERNAL_CLOCK_PRESENT
    v2 = I1
    o = _CLOCK_UNSWUNG

# Apply swing to the clock
[timing]
    c = _CLOCK_UNSWUNG
    r = _RESET
    t1 = 0
    t2 = _CLOCK_SWING * 0.33
    o = _CLOCK

# Pulses for changes via lucky buttons / lucky faders
[lfo]
    hz = 40
    q = _LUCKY_CLOCK

# Clock division 3/2 for the arpeggiators
[clocktool]
    c = _CLOCK
    o = _CLOCK_3_2
    m = 3
    d = 2

# Clock division 2/1 for the arpeggiators
[clocktool]
    c = _CLOCK
    o = _CLOCK_2_1
    m = 2
    d = 1

# Clock division 3/1 for the arpeggiators
[clocktool]
    c = _CLOCK
    o = _CLOCK_3_1
    m = 3
    d = 1

# Clock division 4/1 for the arpeggiators
[clocktool]
    c = _CLOCK
    o = _CLOCK_4_1
    m = 4
    d = 1

# Clock division 6/1 for the arpeggiators
[clocktool]
    c = _CLOCK
    o = _CLOCK_6_1
    m = 6
    d = 1

# Clock division 8/1 for the arpeggiators
[clocktool]
    c = _CLOCK
    o = _CLOCK_8_1
    m = 8
    d = 1

# --------------------------------------------------
# Global buttons
# --------------------------------------------------


# A long press on the clear button resets all settings of the sequencer to its default state
[button]
    b = B2.4
    st = 1
    lop = _FACTORY_RESET

# Do the factory reset
[droid]
    ca = _FACTORY_RESET

# Animation of track buttons when muted.
[lfo]
    l = 0.8
    b = 0
    q = _MUTE_BLINK
    pw = 0.2
    hz = 2.5

# Mute button for track 1 (same as track button)
[button]
    s = _CONTROL
    b = B2.29
    l = L2.29
    o = _T1_MUTED

# Compute state of track LED based on wether it is selected and/or muted
[switch]
    of = _T1_SELECTED * 2 + _T1_MUTED
    i1 = 0
    i2 = _MUTE_BLINK
    i3 = 1
    i4 = 1 - _MUTE_BLINK
    o = _T1_TRACKLED

# Show mute state of track while CTRL is held
[ifequal]
    i1 = _CONTROL
    i2 = 1
    q = _T1_MUTED
    e = _T1_TRACKLED
    o = L2.29

# Mute button for track 2 (same as track button)
[button]
    s = _CONTROL
    b = B2.30
    l = L2.30
    o = _T2_MUTED

# Compute state of track LED based on wether it is selected and/or muted
[switch]
    of = _T2_SELECTED * 2 + _T2_MUTED
    i1 = 0
    i2 = _MUTE_BLINK
    i3 = 1
    i4 = 1 - _MUTE_BLINK
    o = _T2_TRACKLED

# Show mute state of track while CTRL is held
[ifequal]
    i1 = _CONTROL
    i2 = 1
    q = _T2_MUTED
    e = _T2_TRACKLED
    o = L2.30

# Mute button for track 3 (same as track button)
[button]
    s = _CONTROL
    b = B2.31
    l = L2.31
    o = _T3_MUTED

# Compute state of track LED based on wether it is selected and/or muted
[switch]
    of = _T3_SELECTED * 2 + _T3_MUTED
    i1 = 0
    i2 = _MUTE_BLINK
    i3 = 1
    i4 = 1 - _MUTE_BLINK
    o = _T3_TRACKLED

# Show mute state of track while CTRL is held
[ifequal]
    i1 = _CONTROL
    i2 = 1
    q = _T3_MUTED
    e = _T3_TRACKLED
    o = L2.31

# Mute button for track 4 (same as track button)
[button]
    s = _CONTROL
    b = B2.32
    l = L2.32
    o = _T4_MUTED

# Compute state of track LED based on wether it is selected and/or muted
[switch]
    of = _T4_SELECTED * 2 + _T4_MUTED
    i1 = 0
    i2 = _MUTE_BLINK
    i3 = 1
    i4 = 1 - _MUTE_BLINK
    o = _T4_TRACKLED

# Show mute state of track while CTRL is held
[ifequal]
    i1 = _CONTROL
    i2 = 1
    q = _T4_MUTED
    e = _T4_TRACKLED
    o = L2.32

# Track selection
[buttongroup]
    hr = "TRACK"
    o = _SELECTED_TRACK
    s = _NO_CONTROL
    ep = _TRACK_EXTRA_PRESS
    b1 = B2.29
    v1 = 1
    l1 = _T1_SELECTED
    b2 = B2.30
    v2 = 2
    l2 = _T2_SELECTED
    b3 = B2.31
    v3 = 3
    l3 = _T3_SELECTED
    b4 = B2.32
    v4 = 4
    l4 = _T4_SELECTED

# --------------------------------------------------
# Special menus
# --------------------------------------------------


# Select a global menu function of the faders. There is no button for "normal" in order to save
# buttons. Simply press the currently lit button to deactivate all menu buttons and go back
# to controlling the sequence.
[buttongroup]
    b1 = B2.13
    l1 = L2.13
    v1 = 97
    b2 = B2.14
    l2 = L2.14
    v2 = 99
    b3 = B2.15
    l3 = L2.15
    v3 = _SELECTED_TRACK+ 10
    b4 = B2.16
    l4 = L2.16
    v4 = 98
    cl = _FADERMODE_CHANGED
    dy = 0
    sb = 0
    ma = 0
    xa = 1
    o = _GLOBAL_MENU

# If there is no menu active, the fader edit the sequence of the currently selected track.
[ifequal]
    i1 = _GLOBAL_MENU
    i2 = 0
    q = _SELECTED_TRACK
    e = _GLOBAL_MENU
    o = _GLOBAL_FADER_SELECTION

# LFO for blinking the ARP LED while it is in Autostop mode
[lfo]
    hz = 2.5
    b = 0
    l = -0.8
    q = _ARP_AUTOSTOP_BLINK

# Provide state of the control button in a patch cable.
[copy]
    i = B1.8
    o = _CONTROL

# Inverted state of control button, is 1 of not held.
[copy]
    i = 1 - B1.8
    o = _NO_CONTROL

# Select the current mode of the faders for the sequencer
[buttongroup]
    b1 = B2.25
    l1 = L2.25
    v1 = 0
    b2 = B2.18
    l2 = L2.18
    v2 = 3
    b3 = B2.19
    l3 = L2.19
    v3 = 4
    b4 = B2.21
    l4 = L2.21
    v4 = 1
    b5 = B2.27
    l5 = L2.27
    v5 = 10
    b6 = B2.17
    l6 = L2.17
    v6 = 5
    b7 = B2.23
    l7 = L2.23
    v7 = 2
    b8 = B2.22
    l8 = L2.22
    v8 = 20
    dy = 0
    bp = _FADERMODE_CHANGED
    o = _FADERMODE

# Select a button mode that is most useful in the current fader mode
[multicompare]
    i = _FADERMODE
    c1 = 3
    if1 = 3
    c2 = 4
    if2 = 2
    e = 0
    o = _BM
    c3 = 10
    if3 = 10

# When the range button is active, it always has precedence
[ifequal]
    i1 = _RANGE
    i2 = 0
    q = _BM
    e = 1
    o = _BUTTONMODE

# Button for choosing between gates on/off and start/end
[button]
    b = B2.20
    l = L2.20
    st = 1
    o = _RANGE

# Button for reseting all tracks to step 1
[button]
    b = B2.11 * _CONTROL
    l = L2.11
    st = 1
    o = _RESET_BUTTON

# Combine all source of global reset
[mixer]
    i1 = _RESET_BUTTON
    i2 = I2
    i3 = _STARTSTOP_RESET
    o = _RESET

# Button for run/stop
[button]
    l = L2.12
    o = _RUNNING
    b = B2.12
    sv = 1

# Create a reset trigger when the button changes to 'running'
[gatetool]
    ig = _RUNNING
    ot = _STARTSTOP_RESET

# Button for selecting the second page of steps
[button]
    b = B2.28+ _TRACK_EXTRA_PRESS
    l = L2.28
    o = _PAGE
    st = 2

# --------------------------------------------------
# Track 1
# --------------------------------------------------


# Provide trigger when the clear button is pressed (no Ctrl needed)
[button]
    s = _SELECTED_TRACK
    sa = 1
    b = B2.4
