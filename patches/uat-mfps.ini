    o = _T4_ARP_BUTTERFLY

# Select one of three octaving patterns
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _T4_ARP
    sa = 14
    lp = _T4_LOAD_PRESET
    sp = _T4_SAVE_PRESET
    f = 5
    n = 3
    lc = 0.4
    lv = 1
    o = _T4_ARP_OCTAVING

# Compute octave offset pitches from fader setting
[copy]
    i = _T4_ARP_OCTAVE_SWITCH * 1V - 2V
    o = _T4_ARP_OCTAVE

# Select the arpeggio pattern
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _T4_ARP
    sa = 14
    lp = _T4_LOAD_PRESET
    sp = _T4_SAVE_PRESET
    f = 6
    n = 7
    lc = 0.3
    lv = 1
    o = _T4_ARP_PATTERN

# Select one of four different drop patterns
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _T4_ARP
    sa = 14
    lp = _T4_LOAD_PRESET
    sp = _T4_SAVE_PRESET
    f = 7
    n = 4
    lc = 0.5
    lv = 1
    o = _T4_ARP_DROP

# Select one of several clocking patterns
[motorfader]
    s = _GLOBAL_FADER_SELECTION * _T4_ARP
    sa = 14
    lp = _T4_LOAD_PRESET
    sp = _T4_SAVE_PRESET
    f = 8
    n = 8
    lc = 1.1
    lv = 1
    o = _T4_ARP_CLOCKING

# Button for loading preset 1 on track 4
[button]
    s = _SELECTED_TRACK
    sa = 4
    b = B2.1* _CONTROL
    st = 1
    ov = 1
    o = _T4_P1_LOAD

# Button for saving preset 1 on track 4
[button]
    s = _SELECTED_TRACK
    sa = 4
    b = B2.1
    st = 1
    ov = 1
    lop = _T4_P1_SAVE

# Five blinks for the LED of the preset button on saving
[burst]
    t = _T4_P1_SAVE
    hz = 5
    c = 5
    o = _T4_P1_SAVE_LED

# Write the save LED animation to the LED if the track is still selected.
[select]
    s = _SELECTED_TRACK
    sa = 4
    i = _T4_P1_SAVE_LED + 0.3
    o = L2.1

# Button for loading preset 2 on track 4
[button]
    s = _SELECTED_TRACK
    sa = 4
    b = B2.2* _CONTROL
    st = 1
    ov = 2
    o = _T4_P2_LOAD

# Button for saving preset 2 on track 4
[button]
    s = _SELECTED_TRACK
    sa = 4
    b = B2.2
    st = 1
    ov = 2
    lop = _T4_P2_SAVE

# Five blinks for the LED of the preset button on saving
[burst]
    t = _T4_P2_SAVE
    hz = 5
    c = 5
    o = _T4_P2_SAVE_LED

# Write the save LED animation to the LED if the track is still selected.
[select]
    s = _SELECTED_TRACK
    sa = 4
    i = _T4_P2_SAVE_LED + 0.3
    o = L2.2

# Button for loading preset 3 on track 4
[button]
    s = _SELECTED_TRACK
    sa = 4
    b = B2.3* _CONTROL
    st = 1
    ov = 3
    o = _T4_P3_LOAD

# Button for saving preset 3 on track 4
[button]
    s = _SELECTED_TRACK
    sa = 4
    b = B2.3
    st = 1
    ov = 3
    lop = _T4_P3_SAVE

# Five blinks for the LED of the preset button on saving
[burst]
    t = _T4_P3_SAVE
    hz = 5
    c = 5
    o = _T4_P3_SAVE_LED

# Write the save LED animation to the LED if the track is still selected.
[select]
    s = _SELECTED_TRACK
    sa = 4
    i = _T4_P3_SAVE_LED + 0.3
    o = L2.3

# Create a trigger with the preset as value when any of the presets is loaded
[mixer]
    i1 = _T4_P1_LOAD
    i2 = _T4_P2_LOAD
    i3 = _T4_P3_LOAD
    o = _T4_LOAD_PRESET

# Create a trigger with the preset as value when any of the presets is saved
[mixer]
    i1 = _T4_P1_SAVE * 1
    i2 = _T4_P2_SAVE * 2
    i3 = _T4_P3_SAVE * 3
    o = _T4_SAVE_PRESET

# Select which notes from the current scale should be played
[buttongroup]
    s = _SELECTED_TRACK
    sa = 4
    ma = 1
    xa = _CONTROL * -6 + 7
    sb = -1
    b1 = B1.1
    l1 = L1.1
    bo1 = _T4_SEL_1
    b2 = B1.2
    l2 = L1.2
    bo2 = _T4_SEL_2
    b3 = B1.3
    l3 = L1.3
    bo3 = _T4_SEL_3
    b4 = B1.4
    l4 = L1.4
    bo4 = _T4_SEL_4
    b5 = B1.5
    l5 = L1.5
    bo5 = _T4_SEL_5
    b6 = B1.6
    l6 = L1.6
    bo6 = _T4_SEL_6
    b7 = B1.7
    l7 = L1.7
    bo7 = _T4_SEL_7

# Clock divider for track 4
[clocktool]
    c = _CLOCK
    r = _RESET
    d = _T4_CD_EVEN_DIV * _T4_CD_ODD_DIV
    m = _T4_CD_EVEN_MULT * _T4_CD_ODD_MULT
    o = _T4_CLOCK

# Mix global and per-track diatonic transposition
[mixer]
    i1 = _T4_NOTESHIFT_CLOCKED
    i2 = _GLOBAL_NOTESHIFT_CLOCKED
    o = _T4_NOTESHIFT_SUM

# The clear range logic should just affect the current track
[ifequal]
    i1 = _SELECTED_TRACK * _RANGE
    i2 = 4
    q = 1
    o = _T4_CLEAR_RANGE

# Collect different sources of resetting the start/end point
[logic]
    i1 = _T4_CLEAR + _T4_PEACE
    i2 = _T4_CLEAR_RANGE * _CONTROL
    o = _T4_CLEARSTARTEND

# Note shift for each step repetition
[pot]
    s = _T4_ARP * 100 + _SELECTED_TRACK
    sa = 4
    p = P1.1
    d = 15
    sv = 7
    oo = -7
    o = _T4_REPEATSHIFT

# Note shift for each ratchet
[pot]
    s = _T4_ARP * 100 + _SELECTED_TRACK
    sa = 4
    p = P1.2
    d = 15
    sv = 7
    oo = -7
    o = _T4_RATCHETSHIFT

# Sequencer for pitch and gate of track 4
[motoquencer]
    s = _GLOBAL_FADER_SELECTION
    sa = 4
    p = _PAGE
    sc = _T4_COPY_BUTTON
    dr = _T4_COPY_BUTTON
    lp = _T4_LOAD_PRESET
    sp = _T4_SAVE_PRESET
    cl = _T4_CLEAR
    s1 = _T4_SEL_1 + _T4_12TONE
    s3 = _T4_SEL_2 + _T4_12TONE
    s5 = _T4_SEL_3 + _T4_12TONE
    s7 = _T4_SEL_4 + _T4_12TONE
    s9 = _T4_SEL_5 + _T4_12TONE
    s11 = _T4_SEL_6 + _T4_12TONE
    s13 = _T4_SEL_7 + _T4_12TONE
    sf1 = _T4_12TONE
    sf2 = _T4_12TONE
    sf3 = _T4_12TONE
    sf4 = _T4_12TONE
    sf5 = _T4_12TONE
    dg = _DEGREE
    c = _T4_CLOCK * _RUNNING
    tt = _T4_CLOCK
    r = _RESET + _T4_RESET
    cv = _T4_PITCH
    cr = _T4_CVRANGE * 1V
    dfg = 0
    g = _T4_SEQUENCER_GATE
    n = 8
    ns = 16
    ln = 1
    ar = _T4_AUTORESET
    sh = _T4_SHIFTSTEPS
    pt = _T4_PATTERN_FADER - 2
    d = _T4_DIRECTION
    pp = _T4_PINGPONG
    sns = _T4_NOTESHIFT_SUM
    tm = _TUNINGMODE
    tp = 1V
    be = _CONTROL
    co = B2.18
    ac = _T4_ACCU_RANGE
    ro = _ROOT * _T4_TBR_OFF
    tr = _T4_TBR
    lb = _T4_LUCKY * _CONTROL
    lf = _T4_LUCKY * _NO_CONTROL
    lc = 1/8
    la = 0.5 * _NO_CONTROL + 0.5
    ls = 3
    fm = _FADERMODE
    m = 1 - _RUNNING
    fo = _T4_FORM
    iv = _T4_INVERT
    gl = _T4_GATELENGTH
    bm = _BUTTONMODE
    cm = _COMPOSEMODE
    cs = _T4_CLEAR + _T4_PEACE
    crp = _T4_CLEAR + _T4_PEACE
    cse = _T4_CLEARSTARTEND
    rs = _T4_REPEATSHIFT
    ras = _T4_RATCHETSHIFT
    ssq = _T4_START_OF_SEQUENCE

# Sequencer for gate length and glide
[motoquencer]
    s = _GLOBAL_FADER_SELECTION
    sa = 4
    p = _PAGE
    sc = _T4_COPY_BUTTON
    dr = _T4_COPY_BUTTON
    cl = _T4_CLEAR
    lp = _T4_LOAD_PRESET
    sp = _T4_SAVE_PRESET
    cv = _T4_GATELENGTH
    cb = 0.05
    cr = 0.9
    dc = 0.5
    dfg = 0
    q = 0
    bc = 0.5
    ce = "Gate length"
    be = _CONTROL
    ln = 1
    g = _T4_GLIDE
    gn = "Glide"

# Sequencer for activity level per step
[motoquencer]
    s = _GLOBAL_FADER_SELECTION
    sa = 4
    cl = _T4_CLEAR
    lp = _T4_LOAD_PRESET
    sp = _T4_SAVE_PRESET
    cv = _T4_STEP_ACTIVITY
    q = 0
    dc = 7
    ce = "Activity"
    cn = 8
    be = _CONTROL

# Silence the gate if the step does not reach the required activity
[compare]
    i = _T4_STEP_ACTIVITY
    c = _T4_ACTIVITY
    l = 0
    e = _T4_SEQUENCER_GATE
    o = _T4_ACT_GATE

# Modulate gate length for gate output in arpeggiator mode
[gatetool]
    tt = _T4_ARP_TAPTEMPO
    gl = _T4_GATELENGTH
    ig = _T4_ARP_CLOCK
    og = _T4_ARP_MODULATED_GATE

# Switch gate to arpeggiator if active
[ifequal]
    i1 = _T4_ARP_SYNCED
    i2 = 0
    q = _T4_ACT_GATE
    e = _T4_ARP_MODULATED_GATE
    o = _T4_SWITCHED_GATE

# Logic for make the gate silent if the track is muted
[logic]
    i1 = 1 - _T4_MUTED
    i2 = _T4_SWITCHED_GATE
    a = _T4_MUTED_GATE

# Select clock for arpeggiator of track 4. It is either the master clock or a multiplication
# of it, or the sequencer gate output.
[switch]
    i1 = _CLOCK
    i2 = _T4_SEQUENCER_GATE
    i3 = _CLOCK_3_2
    i4 = _CLOCK_2_1
    i5 = _CLOCK_3_1
    i6 = _CLOCK_4_1
    i7 = _CLOCK_6_1
    i8 = _CLOCK_8_1
    o = _T4_ARP_CLOCK
    of = _T4_ARP_CLOCKING

# Create taptempo for arp clock to be used for gate length
[switch]
    i1 = _CLOCK
    i2 = _T4_CLOCK
    i3 = _CLOCK_3_2
    i4 = _CLOCK_2_1
    i5 = _CLOCK_3_1
    i6 = _CLOCK_4_1
    i7 = _CLOCK_6_1
    i8 = _CLOCK_8_1
    o = _T4_ARP_TAPTEMPO
    of = _T4_ARP_CLOCKING * _T4_ARP

# Virtual pot for base pitch of arpeggiator
[pot]
    s = _T4_ARP * 100 + _SELECTED_TRACK
    sa = 104
    p = P1.2
    os = 36
    o = _T4_ARP_PITCH

# Virtual pot for pitch range of arpeggiator
[pot]
    s = _T4_ARP * 100 + _SELECTED_TRACK
    sa = 104
    p = P1.1
    os = 48
    o = _T4_ARP_RANGE

# Arpeggiator for track 4
[arpeggio]
    s1 = _T4_SEL_1
    s3 = _T4_SEL_2
    s5 = _T4_SEL_3
    s7 = _T4_SEL_4
    s9 = _T4_SEL_5
    s11 = _T4_SEL_6
    s13 = _T4_SEL_7
    sf1 = 0
    sf2 = 0
    sf3 = 0
    sf4 = 0
    sf5 = 0
    ro = _ROOT * _T4_TBR_OFF
    tr = _T4_TBR
    dg = _DEGREE
    c = _T4_ARP_CLOCK * _RUNNING
    r = _RESET
    tm = _TUNINGMODE
    d = _T4_ARP_UPDOWN
    pp = _T4_ARP_PINGPONG
    by = _T4_ARP_BUTTERFLY
    oc = _T4_ARP_OCTAVING
    dr = _T4_ARP_DROP
    pt = _T4_ARP_PATTERN
    ar = _T4_ARP_AUTORESET
    p = _T4_ARP_PITCH / 120
    ra = _T4_ARP_RANGE / 120
    o = _T4_ARP_OUTPUT

# Switch pitch output between sequencer and arpeggiator
[ifequal]
    i1 = _T4_ARP_SYNCED
    i2 = 0
    q = _T4_PITCH
    e = _T4_ARP_OUTPUT + _T4_ARP_OCTAVE
    o = _T4_SWITCHED_PITCH

# Mix all sources of pitch together
[mixer]
    i1 = _T4_OCTAVE * 1V - 2V
    i2 = _T4_SWITCHED_PITCH
    i3 = _GLOBAL_OCTAVE_SWITCH * 1V - 2V
    i4 = _GLOBAL_TRANSPOSITION * 0.00833333
    i5 = I5
    o = _T4_FINAL_PITCH

# Slew limiter for glides
[slew]
    i = _T4_FINAL_PITCH
    e = O8
    sw = _T4_GLIDE * _T4_GLIDE_LENGTH

# If we are in compose mode and the arpeggiator is switched off, the gate is output even if
# the sequencer is stopped.
[ifequal]
    i1 = _T4_ARP
    i2 = 0
    q = _RUNNING + _COMPOSEMODE
    e = _RUNNING
    o = _RUNNING_OR_COMPOSE_4

# Copy the gate to its final destination
[copy]
    i = _T4_MUTED_GATE * _RUNNING_OR_COMPOSE_4
    o = _T4_FINAL_GATE

# Copy the gate signal to the CV jack
[copy]
    i = _T4_FINAL_GATE
    o = O4

