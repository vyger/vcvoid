# UAT warning patch: uses MIDI on a classic MASTER. Loads and runs fine,
# but with NO X7 in the chain the master's context menu must show the
# "patch uses MIDI but no X7 detected" warning (M5 ISSUE-3 regression
# check). Chain an X7 and the warning must clear; MIDI notes then flow
# from the X7's USB output at 2 notes/sec.
[lfo]
    hz = 2
    square = _GATE

[midiout]
    pitch = 0.2
    gate = _GATE
