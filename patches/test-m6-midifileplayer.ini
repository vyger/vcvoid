# UAT patch for midifileplayer. Load this droid.ini on a master (either type);
# the player reads patches/midi1.mid from the SAME FOLDER as this file — a
# 4-bar C-major test loop at 120 BPM: an 8th-note melody (voice 1, mostly) over
# a whole-bar bass dyad (voices 2+3), looping forever.
#
#   O1/O2 = melody pitch/gate      -> synth voice 1 (1 V/oct + gate)
#   O3/O4 = bass root pitch/gate   -> synth voice 2
#   O5/O6 = bass third pitch/gate  -> synth voice 3
#   O7    = melody velocity (accented on the beat, softer off-beat)
#   O8    = 16th clock (clockout)  -> scope/clock input
#   R1    = error color (stays dark when the file loads; white -1 = file
#           missing, magenta = corrupt)
#
# Things to try live: turn `speed` via a pot (uncomment), unplug/rename
# midi1.mid and reload to see the error LED.

[midifileplayer]
    # speed = P1.1 * 2
    pitch1 = O1
    gate1 = O2
    pitch2 = O3
    gate2 = O4
    pitch3 = O5
    gate3 = O6
    velocity1 = O7
    clockout = O8
    error = R1
