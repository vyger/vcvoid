# Tier-4 milestone-proof patch: M5 full MIDI round-trip through the X7.
#
# Chain: Master | DroidX7. Route the X7 USB-out INTO the X7 USB-in (Rack: point
# both at the same IAC/loopback bus). The patch plays a sequence out over MIDI
# and reads it straight back — no external gear needed.
#
# Signal path:
#   lfo 2 Hz square  -> _CLK  (both the step clock AND a 16th MIDI clock source)
#   sequencer        -> _PITCH ascending, _GATE per step
#   midiout usb=1    -> sends note-on/off (from _PITCH/_GATE) plus a MIDI clock
#                       (fed from _CLK via its `clock` input) to the USB port
#   midiin  usb=1    -> receives that stream back:
#       O1 = pitch (1 V/oct, note 24 = 0 V), O2 = note gate,
#       G9 = reconstructed 16th clock -> the X7 gate LED blinks.
#
# What to look for: O1 steps through the four sequence pitches, O2 gates in
# lock-step, and the X7 G9 gate LED (+ jack) pulses with the clock. Scope O1/O2
# to confirm the round-trip. Each O/G register is driven exactly once.

[lfo]
    hz      = 2
    bipolar = 0
    square  = _CLK

[sequencer]
    clock       = _CLK
    pitch1      = 0.25
    pitch2      = 0.30
    pitch3      = 0.35
    pitch4      = 0.40
    pitchoutput = _PITCH
    gateoutput  = _GATE

[midiout]
    usb   = 1
    pitch = _PITCH
    gate  = _GATE
    clock = _CLK

[midiin]
    usb    = 1
    pitch1 = O1
    gate1  = O2
    clock  = G9
