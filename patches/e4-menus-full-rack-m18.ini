# LABELS: master=18

# e4-menus-full-rack-m18.ini — MASTER18 adaptation of e4-menus-full-rack.ini
# (test fixture for E4 menu function on a real rack).
# 
# MASTER18 differences handled here:
# * no N1..N8 normalization registers (the MASTER18 has none), so menu 3's
# values park on the native gate outputs G1..G4 instead (thresholded:
# the gate goes high while the value is positive enough — crude but
# visible), and menu 4's values sink into an output-less mixer (a cable
# must be read somewhere; the rings themselves show the values).
# * I1/I2 are gate inputs on a MASTER18 — unused here, nothing to change.
# * O1..O8 CV outputs exist as on the MASTER, so menus 1/2 scope the same.
# 
# The E4 menu behavior under test needs NO master I/O at all — everything
# (dot feedback, jump-on-menu-switch, colors, led override) is on the E4.
# 
# The reported patch overlays multiple encoderbank menus on the same E4
# encoders, gated with `select` from a buttongroup. Symptoms in vcvoid: only
# one menu showed moving-dot ring feedback while turning, menu switches did
# not snap the rings to the newly selected bank's values, and ring colors
# never showed. Four encoderbanks overlay the SAME four encoders
# (E2.1..E2.4), selected by a buttongroup on B1.1..B1.4:
# 
# menu 1 (B1.1)  the style that DID show moving-dot feedback: explicit
# mode = 1, all led params wired to 0, color cyan.
# menu 2 (B1.2)  discrete = 32 rotary-switch mode with
# outputscale/outputoffset.
# menu 3 (B1.3)  bipolar mode = 2 with notch and negativecolor.
# menu 4 (B1.4)  mode unset (defaults to 1), led params driven by DYNAMIC
# values (LFO blink), like the original's cable-driven leds.
# 
# What to check against real-hardware behavior:
# * moving-dot feedback while turning, in EVERY menu (not just menu 1)
# * on switching menus, the rings must JUMP to the newly selected bank's
# values at once (startvalues differ per bank to make that visible)
# * ring color must differ per menu (cyan / red / violet+blue / green)
# * menu 4's rings must blink (dynamic led params override the value dot)
# 
# Outputs for scoping: menu 1 -> O1..O4, menu 2 -> O5..O8 (encoderbank outputs
# stay live even while unselected — only buttons/leds are gated by select).
# Menu 3 -> G1..G4 (gate LEDs), menu 4 -> mixer sink (watch the rings).

[db8e]
[e4]
[e4]
[m4]
[m4]
[m4]
[b32]
[b32]
[p2b8]

# --- menu selection, one button per menu
[buttongroup]
    button1 = B9.1
    led1 = L9.1
    buttonoutput1 = _MENU1
    button2 = B9.2
    led2 = L9.2
    buttonoutput2 = _MENU2
    button3 = B9.3
    led3 = L9.3
    buttonoutput3 = _MENU3
    button4 = B9.4
    led4 = L9.4
    buttonoutput4 = _MENU4
    startbutton = 1

# --- menu 1: (mode = 1, leds forced to 0, cyan) — may be working currently
[encoderbank]
    select = _MENU1
    firstencoder = E2.1
    mode = 1
    autozoom = 1
    sensivity = 2
    color = 0.2
    startvalue = 0.25
    output1 = O1
    output2 = O2
    output3 = O3
    output4 = O4
    led1 = 0
    led2 = 0
    led3 = 0
    led4 = 0

# --- menu 2: (discrete rotary switch + output scaling)
[encoderbank]
    select = _MENU2
    firstencoder = E2.1
    startvalue = 0
    discrete = 32
    outputscale = 1
    outputoffset = 1
    autozoom = 1
    sensivity = 2
    color = 0.9
    output1 = O5
    output2 = O6
    output3 = O7
    output4 = O8

# --- menu 3: (bipolar with notch and negativecolor)
[encoderbank]
    select = _MENU3
    firstencoder = E2.1
    mode = 2
    notch = 0.15
    color = 1.1
    negativecolor = 1.2
    autozoom = 1
    sensivity = 2
    startvalue = 0.75
    output1 = _M3_V1
    output2 = _M3_V2
    output3 = _M3_V3
    output4 = _M3_V4

# --- menu 4: (mode left at default, leds driven dynamically)
[encoderbank]
    select = _MENU4
    firstencoder = E2.1
    autozoom = 1
    sensivity = 2
    color = 0.55
    startvalue = 1
    output1 = _M4_V1
    output2 = _M4_V2
    output3 = _M4_V3
    output4 = _M4_V4
    led1 = _BLINK * 0.25
    led2 = _BLINK * 0.5
    led3 = 0
    led4 = _BLINK

# 2 Hz blink source for menu 4's dynamic leds
[lfo]
    hz = 2
    square = _BLINK

# park menu 3 on the MASTER18's native gate outputs (no N registers here);
# the gate LED lights while the (bipolar) value is high enough
[copy]
    input = _M3_V1
    output = G1.1

[copy]
    input = _M3_V2
    output = G1.2

[copy]
    input = _M3_V3
    output = G1.3

[copy]
    input = _M3_V4
    output = G1.4

# sink menu 4's cables (every cable needs a reader; no registers left to
# park them on — read the values off the encoder rings instead)
[mixer]
    input1 = _M4_V1
    input2 = _M4_V2
    input3 = _M4_V3
    input4 = _M4_V4
